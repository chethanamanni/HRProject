{% extends "layout.html" %}
{% block content %}
<h2>Attendance Record</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for row in attendance %}
    <tr>
        <td>{{ row.Date }}</td>
        <td>{{ row.Status }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
